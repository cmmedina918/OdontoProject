{% extends 'base.html' %}
{% block title %}
	Create enfermedad
{% endblock %}
{% block body %}
	<div class="d-flex justify-content-center">
        <div>
            <br>
            <h2>Crear una enfermedad</h2>
            <br>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.nombre.label_tag }} {{ form.nombre }}
                </div>
                <br>
                <input class="btn btn-success" type="submit" value="Guardar">
            </form>
        </div>
    </div>
{% endblock %}
